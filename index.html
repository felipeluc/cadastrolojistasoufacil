<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Financeiro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Tela de Login -->
  <section id="loginSection">
    <form id="loginForm" class="card">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Usuário" required />
      <input type="password" id="password" placeholder="Senha" required />
      <button type="submit">Entrar</button>
    </form>
  </section>

  <!-- Dashboard -->
  <section id="dashboard" style="display:none;">
    <header>
      <h1>Sistema Financeiro</h1>
      <button id="logoutBtn">Sair</button>
    </header>

    <main>
      <h2>Bem-vindo, Felipe!</h2>
      <nav>
        <button class="tabBtn" data-tab="cartoes">Cartões</button>
        <button class="tabBtn" data-tab="parcelas">Parcelas</button>
        <button class="tabBtn" data-tab="casa">Casa</button>
        <button class="tabBtn" data-tab="geral">Visão Geral</button>
      </nav>

      <div id="content">
        <!-- CARTÕES -->
        <div class="tab active" id="cartoes">
          <h3>Meus Cartões</h3>
          <div id="cartoesList"></div>
          <h4>Adicionar gasto de outra pessoa</h4>
          <form id="outrosForm">
            <select id="cartaoSelect"></select>
            <input type="text" id="nomeOutro" placeholder="Nome" required />
            <input type="number" id="valorOutro" placeholder="Valor" required />
            <button type="submit">Adicionar</button>
          </form>
        </div>

        <!-- PARCELAS -->
        <div class="tab" id="parcelas">
          <h3>Controle de Parcelas</h3>
          <form id="parcelaForm">
            <input type="text" id="parcelaNome" placeholder="Descrição" required />
            <input type="number" id="parcelaValor" placeholder="Valor da parcela" required />
            <input type="number" id="qtdParcelas" placeholder="Qtd. Parcelas" required />
            <select id="bancoParcela">
              <option value="Nubank">Nubank</option>
              <option value="BB">Banco do Brasil</option>
              <option value="Will Bank">Will Bank</option>
              <option value="Mercado Pago">Mercado Pago</option>
              <option value="Bradesco">Bradesco</option>
            </select>
            <button type="submit">Cadastrar</button>
          </form>
          <div id="listaParcelas"></div>
        </div>

        <!-- CASA -->
        <div class="tab" id="casa">
          <h3>Gastos da Casa</h3>
          <form id="casaForm">
            <select id="tipoGastoCasa">
              <option value="Aluguel">Aluguel</option>
              <option value="Mercado">Mercado</option>
              <option value="Luz">Luz</option>
              <option value="Água">Água</option>
              <option value="Ração">Ração</option>
              <option value="Internet">Internet</option>
              <option value="Reserva">Reserva</option>
              <option value="Pensão">Pensão</option>
            </select>
            <input type="number" id="valorCasa" placeholder="Valor" required />
            <input type="date" id="dataCasa" required />
            <button type="submit">Adicionar</button>
          </form>
          <div id="listaCasa"></div>
        </div>

        <!-- VISÃO GERAL -->
        <div class="tab" id="geral">
          <h3>Resumo Geral</h3>
          <div id="resumo"></div>
        </div>
      </div>
    </main>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
